version: '3.8'

services:
  # Frontend web server
  frontend:
    image: nginx:alpine
    container_name: lend-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lend-network

  # Backend API server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lend-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - CLIENT_URL=http://localhost
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lend-network

networks:
  lend-network:
    driver: bridge
